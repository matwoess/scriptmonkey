<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Target Site</title>
    <style>
        :root {
            --bg-color: #f9fafb;
            --text-color: #111827;
            --card-bg: #ffffff;
            --accent: #3b82f6;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #111827;
                --text-color: #f9fafb;
                --card-bg: #1f2937;
                --accent: #60a5fa;
            }
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        main {
            background: var(--card-bg);
            padding: 2rem 3rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: var(--accent);
            margin-top: 0;
        }
        
        p {
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <main>
        <h1>Mock Target Site</h1>
        <p>This is a generic mock page used for E2E testing of Scriptmonkey.</p>
        <p>It contains multiple paragraphs so that our test script (paragraph_counter.js) has something to count and display.</p>
        <p>This ensures our scripts can interact with a clean, predictable DOM structure.</p>
    </main>
</body>
</html>
