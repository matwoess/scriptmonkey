<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --border: #0f3460;
      --text: #e0e0e0;
      --muted: #7a7a8e;
      --accent: #e94560;
      --accent-dim: #a83248;
      --green: #4ecca3;
      --font: "SF Mono", "Cascadia Code", "Fira Code", monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      font-family: var(--font);
      font-size: 12px;
      background: var(--bg);
      color: var(--text);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .5px;
    }
    header .count {
      font-size: 11px;
      color: var(--muted);
    }

    .scripts { max-height: 340px; overflow-y: auto; }

    .banner {
      margin: 10px 14px 0;
      padding: 10px;
      border: 1px solid #7d5a00;
      background: #2c2400;
      color: #ffd76a;
      border-radius: 4px;
      line-height: 1.4;
    }

    .toolbar {
      padding: 10px 14px 0;
      display: flex;
      gap: 8px;
      justify-content: space-between;
      align-items: center;
    }

    .toolbar-info {
      color: var(--muted);
      font-size: 10px;
    }

    .script-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      transition: background .15s;
    }
    .script-item:hover { background: var(--surface); }

    .script-info { flex: 1; min-width: 0; }
    .script-name {
      font-weight: 600;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .script-desc {
      color: var(--muted);
      font-size: 10px;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .script-match {
      color: var(--accent-dim);
      font-size: 9px;
      margin-top: 2px;
      font-family: var(--font);
    }

    .script-update {
      color: #ffd76a;
      font-size: 9px;
      margin-top: 4px;
    }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 32px; height: 18px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider {
      position: absolute; inset: 0;
      background: var(--border);
      border-radius: 9px;
      cursor: pointer;
      transition: background .2s;
    }
    .toggle .slider::before {
      content: "";
      position: absolute;
      width: 14px; height: 14px;
      left: 2px; bottom: 2px;
      background: var(--text);
      border-radius: 50%;
      transition: transform .2s;
    }
    .toggle input:checked + .slider { background: var(--green); }
    .toggle input:checked + .slider::before { transform: translateX(14px); }

    .btn-remove {
      background: none; border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      padding: 2px;
      line-height: 1;
      transition: color .15s;
    }
    .btn-remove:hover { color: var(--accent); }

    .empty {
      padding: 24px 14px;
      text-align: center;
      color: var(--muted);
    }

    .actions {
      padding: 10px 14px;
      display: flex;
      gap: 8px;
      border-top: 1px solid var(--border);
    }
    .btn {
      padding: 7px 0;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      color: var(--text);
      font-family: var(--font);
      font-size: 11px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      text-align: center;
    }
    .btn:hover { border-color: var(--accent); background: var(--bg); }

    .btn:disabled {
      opacity: .5;
      cursor: default;
    }

    .btn-update {
      min-width: 56px;
      padding: 6px 8px;
      font-size: 10px;
    }

    .section-label {
      padding: 8px 14px 4px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
    }

    /* Hidden file input */
    #file-input { display: none; }
  </style>
</head>
<body>
  <header>
    <h1>Scriptmonkey</h1>
    <span class="count" id="count"></span>
  </header>

  <div class="banner" id="warning" hidden></div>

  <div class="toolbar">
    <div class="toolbar-info" id="update-status"></div>
    <button class="btn" id="btn-check-updates">Check for updates</button>
    <button class="btn" id="btn-update-all" hidden>Update all</button>
  </div>

  <div id="active-section">
    <div class="section-label">Active on this page</div>
    <div class="scripts" id="active-list"></div>
  </div>

  <div id="other-section">
    <div class="section-label">Other scripts</div>
    <div class="scripts" id="other-list"></div>
  </div>

  <div class="actions">
    <button class="btn" id="btn-add-file">+ Add file</button>
  </div>

  <input type="file" id="file-input" accept=".js,.user.js" multiple>
  <script src="popup.js"></script>
</body>
</html>
